# Enclave — run a hardened agent with a local web chat.
#
#   cp .env.example .env        # set AGENT_ID, BRAIN, etc.
#   # put creds in ./secrets/ (e.g. anthropic.env with CLAUDE_CODE_OAUTH_TOKEN)
#   docker compose up -d --build
#   open http://127.0.0.1:8888/
#
# The agent's HOME is ./home (its CLAUDE.md, skills, memory, work queue, state).
# Generated by `enclave init <name>`; edit ./home/CLAUDE.md to define the agent's mission.

# Project name is keyed to the AGENT (not the folder), so container names + named volumes never collide
# between deployments — you can place enclave in any folder, and run many agents side by side.
name: ${AGENT_ID:-enclave-agent}

services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
      args:
        INSTALL_CODEGRAPH: ${INSTALL_CODEGRAPH:-0}   # set 1 to bake the codegraph code-memory MCP (docs/CODE-MEMORY.md)
    image: ${ENCLAVE_AGENT_IMAGE:-enclave-agent:latest}   # set to a registry path to pull a prebuilt image
    container_name: ${AGENT_ID:-enclave-agent}
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    extra_hosts: ["host.docker.internal:host-gateway"]   # reach host tools on Linux too
    env_file:                                             # CLAUDE_CODE_OAUTH_TOKEN (BRAIN=claude) — optional so api/local don't need it
      - path: ./secrets/anthropic.env
        required: false
    # BRAIN=api/local read their key (OPENROUTER_API_KEY/…) directly from the mounted /workspace/.secrets/*.env
    environment:
      - AGENT_DIR=/agent                       # the CMD env-loader reads $AGENT_DIR/agent.env — must be set or home/agent.env extras (ROLE, ROUTER, COMMS_URL, …) silently never load
      - AGENT_ID=${AGENT_ID:-enclave-agent}
      - BRAIN=${BRAIN:-claude}
      - MODEL=${MODEL:-claude-sonnet-4-6}
      - RUNTIME_MODE=${RUNTIME_MODE:-daemon}
      - INTERVAL_SECONDS=${INTERVAL_SECONDS:-86400}
      - PERMISSION=${PERMISSION:-dangerous}
      - TOOLS_ROOT=/workspace
      - WORK_DIR=/work                       # in-container path of the project working folder (set the HOST path via WORK_DIR in .env)
    volumes:
      - ./home:/agent                        # agent HOME (rw): its brain — CLAUDE.md, memory, skills, inbox, work queue, state
      - ${WORK_DIR:-./home/work}:/work       # project WORKING FOLDER (rw): where the agent does + saves real work. Set WORK_DIR in .env to a host repo; defaults to home/work (inside the vault). Index it for fresh recall — see docs/WORK-DIR.md.
      - ./secrets:/workspace/.secrets:ro     # scoped credentials (read-only)
      - enclave-agent-claude:/home/agent/.claude  # persist Claude Code chat SESSIONS across image rebuilds (thread continuity)
    restart: unless-stopped

  web-chat:
    build:
      context: .
      dockerfile: Dockerfile.chat
    image: ${ENCLAVE_CHAT_IMAGE:-enclave-chat:latest}    # set to a registry path to pull a prebuilt image
    container_name: ${AGENT_ID:-enclave-agent}-chat
    volumes:
      - ./home:/agent                        # shares inbox.md + state/chat-reply.md + outputs/ with the agent
      - ${WORK_DIR:-./home/work}:/work:ro    # read-only: enumerate the working folder's .claude/skills for the slash menu
    environment:
      - AGENT_DIR=/agent
      - AGENT_NAME=${AGENT_ID:-Agent}
      - WORK_DIR=/work
      - WEB_CHAT_PORT=8888
      - WEB_CHAT_TOKEN=${WEB_CHAT_TOKEN:-}
      - TRANSCRIBE_URL=${TRANSCRIBE_URL:-}     # optional server-side STT (else browser Web Speech)
      - TTS_URL=${TTS_URL:-}                   # optional server-side TTS (else browser speechSynthesis)
      - TTS_VOICE=${TTS_VOICE:-}
    extra_hosts: ["host.docker.internal:host-gateway"]   # reach host voice services on Linux too
    ports:
      - "${WEB_CHAT_BIND:-127.0.0.1:8888}:8888"
    restart: unless-stopped
    depends_on:
      - agent

  # Optional qmd memory accelerator (opt-in — the wiki is the default memory):
  #   docker compose --profile qmd up -d --build qmd
  # Build the index first (one-shot, rebuildable — it points INTO the wiki):
  #   docker compose run --rm -e QMD_MODE=reembed qmd
  # Then point the agent's home/.mcp.json at the in-network gateway:
  #   { "mcpServers": { "qmd": { "type": "http", "url": "http://qmd:18182/mcp" } } }
  # The gateway is fail-closed: QMD_ALLOWED_COLLECTIONS must be set (per-agent allowlist).
  qmd:
    build:
      context: .
      dockerfile: Dockerfile.qmd
    image: ${ENCLAVE_QMD_IMAGE:-enclave-qmd:latest}
    container_name: ${AGENT_ID:-enclave-agent}-qmd
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    environment:
      - QMD_MODE=${QMD_MODE:-serve}
      - QMD_ALLOWED_COLLECTIONS=${QMD_ALLOWED_COLLECTIONS:-knowledge}
      - QMD_GW_HTTP_PORT=18182
      - QMD_GW_HTTP_HOST=0.0.0.0
      - QMD_DB=/index/index.sqlite
      - QMD_CORPUS=/corpus
      - QMD_FORCE_CPU=${QMD_FORCE_CPU:-1}     # GPU profile (Linux+NVIDIA) can set this to 0
    volumes:
      - ./home/knowledge:/corpus:ro           # the wiki = source of truth (read-only)
      - qmd-index:/index                      # disposable, rebuildable vector index
    profiles: [qmd]
    restart: unless-stopped

  # Optional codegraph code-memory in SHARED mode (one HTTP MCP bridge, many agents):
  #   docker compose run --rm -e CODEGRAPH_MODE=reembed codegraph   # build the shared index first
  #   docker compose --profile codegraph up -d --build codegraph    # serve the bridge
  # Then point agents at it:  home/.mcp.json →
  #   { "mcpServers": { "codegraph": { "type": "http", "url": "http://codegraph:18184/mcp" } } }
  # (Agents need NOTHING baked — they just hit the network bridge. Set CODE_CORPUS to your repos dir.)
  codegraph:
    build:
      context: .
      dockerfile: Dockerfile.codegraph
    image: ${ENCLAVE_CODEGRAPH_IMAGE:-enclave-codegraph:latest}
    container_name: ${AGENT_ID:-enclave-agent}-codegraph
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    environment:
      - CODEGRAPH_MODE=${CODEGRAPH_MODE:-serve}
      - CODEGRAPH_CORPUS=/corpus
      - CODEGRAPH_GW_HTTP_PORT=18184
      - CODEGRAPH_GW_HTTP_HOST=0.0.0.0
      - DO_NOT_TRACK=1
    volumes:
      - ${CODE_CORPUS:-./code}:/corpus      # the repo corpus — WRITABLE (SQLite manages .codegraph/)
    profiles: [codegraph]
    restart: unless-stopped

  # Optional Telegram interface: docker compose --profile telegram up -d
  telegram-relay:
    build:
      context: .
      dockerfile: Dockerfile.relay
    image: enclave-relay:latest
    container_name: ${AGENT_ID:-enclave-agent}-telegram
    volumes:
      - ./home:/agent
    environment:
      - AGENT_DIR=/agent
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    profiles: [telegram]
    depends_on:
      - agent

volumes:
  qmd-index:        # disposable qmd vector index (rebuildable from the wiki via QMD_MODE=reembed)
  enclave-agent-claude:   # persists /home/agent/.claude (Claude Code sessions) so chat threads survive image rebuilds
